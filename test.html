<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>プランB テスト環境</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* 最低限のテスト用デザイン */
        body { background-color: #2E5D4B; color: white; font-family: sans-serif; padding: 20px; }
        .box { background: rgba(0,0,0,0.5); padding: 20px; border-radius: 10px; margin-top: 20px; }
        
        /* ▼ 本番環境のCSSからチャット部分だけをコピー ▼ */
        .chat-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 3000; justify-content: center; align-items: center; padding: 20px; }
        .chat-modal.is-active { display: flex; }
        .chat-container { background: #8F9D8D; width: 100%; max-width: 400px; border-radius: 10px; overflow: hidden; display: flex; flex-direction: column; height: 80vh; max-height: 600px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .chat-header { background: #2E5D4B; color: white; padding: 15px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .chat-close-btn { background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; }
        .chat-body { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; background: #8F9D8D; }
        .chat-bubble { max-width: 80%; padding: 10px 15px; border-radius: 15px; font-size: 0.9rem; line-height: 1.4; word-wrap: break-word; }
        .chat-bubble.ai { background: white; color: #333; align-self: flex-start; border-bottom-left-radius: 2px; }
        .chat-bubble.user { background: #E6C445; color: #333; align-self: flex-end; border-bottom-right-radius: 2px; }
        .chat-footer { padding: 10px; background: white; display: flex; gap: 10px; }
        .chat-footer input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 20px; outline: none; }
        .chat-footer button { background: #2E5D4B; color: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; justify-content: center; align-items: center; }
        .social-btn { display: inline-flex; justify-content: center; align-items: center; width: 50px; height: 50px; border-radius: 50%; color: white; text-decoration: none; cursor: pointer; font-size: 1.5rem; }
    </style>
</head>
<body>
    <h1>プランB（GAS連携）開発ルーム🛠️</h1>
    <div class="box">
        <p>ここにお気に入りのデザインを退避しました！</p>
        <p>下のボタンを押すと、あのデザインが開きます👇</p>
        <a href="#" id="openTestChatBtn" class="social-btn" style="background-color: #E6C445; color: #333;"><i class="fa-solid fa-comment-dots"></i></a>
    </div>

    <div id="aiChatModal" class="chat-modal">
        <div class="chat-container">
            <div class="chat-header">
                <span><i class="fa-solid fa-robot"></i> 集団下校 AIスタッフ</span>
                <button id="closeChatBtn" class="chat-close-btn"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="chat-body" id="chatBody">
                <div class="chat-bubble ai">
                    ここはテストルームです！デザインの退避完了しました！
                </div>
            </div>
            <div class="chat-footer">
                <input type="text" id="chatInput" placeholder="メッセージを入力..." autocomplete="off">
                <button id="chatSendBtn"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script>
        // 開閉の動きだけつけておきます
        const openBtn = document.getElementById('openTestChatBtn');
        const closeBtn = document.getElementById('closeChatBtn');
        const modal = document.getElementById('aiChatModal');
        
        openBtn.addEventListener('click', (e) => { e.preventDefault(); modal.classList.add('is-active'); });
        closeBtn.addEventListener('click', () => { modal.classList.remove('is-active'); });
    </script>
</body>
</html>
